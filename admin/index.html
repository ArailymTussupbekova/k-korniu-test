<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабинет — заявки клиентов</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Manrope:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bg-0:#FAF8F4; --bg-1:#FFFFFF; --bg-2:#F1EEE6; --line:#DCD6C9;
  --text:#26291F; --text-dim:#5B6354; --gold:#4B6B4F; --gold-dim:#9DB8A0;
  --danger:#A15C74; --radius:16px;
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Manrope', sans-serif; background:var(--bg-0); color:var(--text);
  min-height:100vh; padding:24px 16px 60px;
}
.wrap{max-width:900px; margin:0 auto;}
h1{font-family:'Fraunces', serif; font-weight:600; font-size:26px; margin-bottom:6px;}
.sub{color:var(--text-dim); font-size:14px; margin-bottom:24px;}

/* login */
#loginBox{
  max-width:380px; margin:80px auto; background:var(--bg-1); border:1px solid var(--line);
  border-radius:var(--radius); padding:28px 24px;
}
#loginBox h1{text-align:center; margin-bottom:20px;}
.field{margin-bottom:14px;}
.field label{display:block; font-family:'IBM Plex Mono', monospace; font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-dim); margin-bottom:6px;}
.field input{
  width:100%; padding:12px 14px; border:1px solid var(--line); border-radius:10px;
  font-family:'Manrope', sans-serif; font-size:15px; outline:none; background:var(--bg-1); color:var(--text);
}
.field input:focus{border-color:var(--gold);}
.btn{
  display:inline-block; background:var(--gold); color:#FBFAF6; border:none; border-radius:10px;
  padding:12px 18px; font-weight:700; font-size:14.5px; cursor:pointer; font-family:'Manrope', sans-serif;
}
.btn:disabled{opacity:.5; cursor:not-allowed;}
.btn.full{width:100%; margin-top:6px;}
.btn.secondary{background:transparent; border:1px solid var(--line); color:var(--text);}
.btn.danger{background:transparent; border:1px solid var(--danger); color:var(--danger); font-size:12.5px; padding:6px 10px;}
#loginError{color:var(--danger); font-size:13px; margin-top:10px; min-height:16px;}

/* top bar */
.topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; flex-wrap:wrap; gap:10px;}
.searchBox input{
  width:260px; max-width:100%; padding:10px 14px; border:1px solid var(--line); border-radius:10px;
  font-family:'Manrope', sans-serif; font-size:14px; outline:none;
}
.searchBox input:focus{border-color:var(--gold);}

/* cards */
.card{
  background:var(--bg-1); border:1px solid var(--line); border-radius:var(--radius);
  padding:16px 18px; margin-bottom:12px;
}
.card-top{display:flex; justify-content:space-between; align-items:flex-start; gap:10px; cursor:pointer;}
.card-name{font-weight:700; font-size:16px;}
.card-meta{font-size:12.5px; color:var(--text-dim); margin-top:2px;}
.badge{
  font-family:'IBM Plex Mono', monospace; font-size:10.5px; text-transform:uppercase; letter-spacing:.05em;
  padding:4px 8px; border-radius:999px; white-space:nowrap;
}
.badge.completed{background:rgba(75,107,79,.14); color:var(--gold);}
.badge.contact{background:rgba(161,92,116,.12); color:var(--danger);}
.card-pattern{font-family:'Fraunces', serif; font-weight:600; font-size:15px; margin-top:8px; color:var(--gold);}
.card-details{display:none; margin-top:12px; border-top:1px solid var(--line); padding-top:12px; font-size:13.5px; line-height:1.6;}
.card-details.open{display:block;}
.card-details .row{margin-bottom:8px;}
.card-details .row b{color:var(--text-dim); font-weight:700; display:block; font-size:11px; text-transform:uppercase; letter-spacing:.04em; margin-bottom:2px;}
.qa{background:var(--bg-2); border-radius:10px; padding:10px 12px; margin-top:4px;}
.qa div{margin-bottom:6px;}
.qa div:last-child{margin-bottom:0;}
.card-actions{margin-top:12px; text-align:right;}

#empty{color:var(--text-dim); text-align:center; padding:40px 0;}
.hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap">

  <div id="loginBox">
    <h1>Кабинет</h1>
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" autocomplete="username" placeholder="you@example.com">
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="loginPassword" autocomplete="current-password" placeholder="••••••••">
    </div>
    <button class="btn full" id="loginBtn">Войти</button>
    <div id="loginError"></div>
  </div>

  <div id="dashboard" class="hidden">
    <div class="topbar">
      <div>
        <h1>Заявки клиентов</h1>
        <div class="sub">Все прохождения теста «К Корню» / «Түбірге»</div>
      </div>
      <div>
        <button class="btn secondary" id="logoutBtn">Выйти</button>
      </div>
    </div>
    <div class="topbar">
      <div class="searchBox">
        <input type="text" id="searchInput" placeholder="Поиск по имени или телефону...">
      </div>
      <div class="sub" id="countLabel"></div>
    </div>
    <div id="list"></div>
    <div id="empty" class="hidden">Пока нет ни одной заявки.</div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://dgmzlgjvgkomxjvgtyga.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRnbXpsZ2p2Z2tvbXhqdmd0eWdhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQxMDU5ODYsImV4cCI6MjA5OTY4MTk4Nn0.83MwBoa2jutzc8kXtPGYnYWZtdUwf7So5xCcb0ccZL0';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const loginBox = document.getElementById('loginBox');
const dashboard = document.getElementById('dashboard');
const loginError = document.getElementById('loginError');

let allRows = [];

async function checkSession(){
  const { data: { session } } = await supabaseClient.auth.getSession();
  if(session){ showDashboard(); } else { showLogin(); }
}

function showLogin(){
  loginBox.classList.remove('hidden');
  dashboard.classList.add('hidden');
}

function showDashboard(){
  loginBox.classList.add('hidden');
  dashboard.classList.remove('hidden');
  loadData();
}

document.getElementById('loginBtn').addEventListener('click', async ()=>{
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  loginError.textContent = '';
  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });
  if(error){ loginError.textContent = 'Неверный email или пароль.'; return; }
  showDashboard();
});

document.getElementById('logoutBtn').addEventListener('click', async ()=>{
  await supabaseClient.auth.signOut();
  showLogin();
});

document.getElementById('searchInput').addEventListener('input', (e)=>{
  render(e.target.value.trim().toLowerCase());
});

async function loadData(){
  const { data, error } = await supabaseClient
    .from('submissions')
    .select('*')
    .order('created_at', { ascending: false });

  if(error){
    document.getElementById('list').innerHTML = '';
    document.getElementById('empty').classList.remove('hidden');
    document.getElementById('empty').textContent = 'Ошибка загрузки: ' + error.message;
    return;
  }
  allRows = data || [];
  render('');
}

function bestRowPerSession(rows){
  const bySession = new Map();
  rows.forEach(r=>{
    const key = r.session_id || r.id;
    const existing = bySession.get(key);
    if(!existing){ bySession.set(key, r); return; }
    if(existing.stage !== 'completed' && r.stage === 'completed'){ bySession.set(key, r); return; }
    if(new Date(r.created_at) > new Date(existing.created_at) && existing.stage === r.stage){ bySession.set(key, r); }
  });
  return Array.from(bySession.values()).sort((a,b)=> new Date(b.created_at) - new Date(a.created_at));
}

function render(filter){
  const grouped = bestRowPerSession(allRows);
  const filtered = filter
    ? grouped.filter(r => (r.name||'').toLowerCase().includes(filter) || (r.phone||'').toLowerCase().includes(filter))
    : grouped;

  document.getElementById('countLabel').textContent = filtered.length + ' заявок';
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');

  if(filtered.length === 0){
    list.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  list.innerHTML = filtered.map(r => cardHtml(r)).join('');

  list.querySelectorAll('.card-top').forEach(el=>{
    el.addEventListener('click', ()=>{
      el.parentElement.querySelector('.card-details').classList.toggle('open');
    });
  });
  list.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(!confirm('Удалить эту заявку без возможности восстановления?')) return;
      const sessionId = btn.dataset.session;
      await supabaseClient.from('submissions').delete().eq('session_id', sessionId);
      await loadData();
    });
  });
}

function esc(s){
  return (s||'').toString().replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function cardHtml(r){
  const date = new Date(r.created_at).toLocaleString('ru-RU');
  const isCompleted = r.stage === 'completed';
  let answers = [];
  try { answers = Array.isArray(r.answers) ? r.answers : (r.answers ? JSON.parse(r.answers) : []); } catch(e){ answers = []; }

  return `
    <div class="card">
      <div class="card-top">
        <div>
          <div class="card-name">${esc(r.name) || '—'} · ${esc(r.phone) || '—'}</div>
          <div class="card-meta">${date} · ${esc(r.site || '')} ${r.lang ? '· ' + esc(r.lang).toUpperCase() : ''} ${r.category ? '· ' + esc(r.category) : ''}</div>
          ${isCompleted && r.pattern_title ? `<div class="card-pattern">${esc(r.pattern_title)}</div>` : ''}
        </div>
        <span class="badge ${isCompleted ? 'completed' : 'contact'}">${isCompleted ? 'Завершил тест' : 'Только контакт'}</span>
      </div>
      <div class="card-details">
        ${r.problem_text ? `<div class="row"><b>Описание проблемы</b>${esc(r.problem_text)}</div>` : ''}
        ${r.duration ? `<div class="row"><b>Длится</b>${esc(r.duration)}</div>` : ''}
        ${r.situation_text ? `<div class="row"><b>Ситуация</b>${esc(r.situation_text)}</div>` : ''}
        ${r.emotions ? `<div class="row"><b>Эмоции</b>${esc(r.emotions)}</div>` : ''}
        ${answers.length ? `<div class="row"><b>Ответы на вопросы теста</b><div class="qa">${answers.map(a=>`<div>• ${esc(a.q)} — <i>${esc(a.a)}</i></div>`).join('')}</div></div>` : ''}
        <div class="card-actions">
          <button class="btn danger delete-btn" data-session="${esc(r.session_id)}">Удалить заявку</button>
        </div>
      </div>
    </div>
  `;
}

checkSession();
</script>
</body>
</html>
